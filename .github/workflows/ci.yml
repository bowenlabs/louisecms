name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin the runner to Node 26 (repo engines + .nvmrc). Vite+ runs with
      # VP_NODE_MANAGER=no below, so it uses this runner Node rather than managing
      # its own.
      - uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Install Vite+
        run: |
          curl -fsSL https://vite.plus | VP_NODE_MANAGER=no bash
          # The installer drops the `vp` binary in ~/.vite-plus/bin.
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Install workspace
        run: vp install

      - name: Lint & format (Oxlint + Oxfmt)
        run: vp check
        working-directory: packages/louise

      # oxlint doesn't parse .astro; Biome lints the component scripts (partial
      # Astro support). Scoped to **/*.astro in biome.json — no overlap with oxlint.
      - name: Lint .astro (Biome)
        run: node_modules/.bin/biome lint .

      # `vp check` uses vp's own bundled oxlint and ignores the repo .oxlintrc.json
      # (and its jsPlugins). Run a standalone oxlint to load eslint-plugin-solid via
      # jsPlugins and lint the SolidJS inline-edit client (solid/* rules). It MUST
      # be isolated (npx), not a node_modules dep — a node_modules oxlint shadows
      # vp's and breaks `vp check` (vp reads its oxlint config from vite.config.ts,
      # which imports vite-plus, unresolvable to a standalone oxlint).
      - name: Lint SolidJS client (oxlint + eslint-plugin-solid)
        run: npx --yes -p oxlint@1.73.0 -p eslint-plugin-solid@0.14.5 oxlint packages/louise/src/client

      # Dead-code check: unused files and exports across the workspace. Runs on
      # source (entry points mapped in knip.jsonc), so no build is needed.
      - name: Dead-code check (Knip)
        run: node_modules/.bin/knip

      - name: Type-check
        run: vp run "louise#typecheck"

      - name: Test
        run: vp test
        working-directory: packages/louise

      # Build directly (not `vp run louise#pack`): the task-runner form can serve
      # a cache hit without restoring dist/, leaving the site build unable to
      # resolve the `louise-toolkit/*` subpaths.
      - name: Build the library (dist/)
        run: NODE_PATH=node_modules vp pack
        working-directory: packages/louise

      # Build the Astroid CLI (tsgo → dist/) so its generators + bin are runnable.
      # Not a `vp run` task (this must actually produce dist/, like the louise pack
      # above) — the package's own build script emits it.
      - name: Build the Astroid CLI (dist/)
        run: corepack pnpm --filter astroidjs run build
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

      # Exercise create-astroid's template/ payload end-to-end: scaffold a throwaway
      # project with the same generators the CLI ships, then validate it with
      # `astroid doctor`. Catches a broken scaffold engine, a generator whose output
      # drifts from doctor's expectations, or a missing binding — none of which the
      # dead-code / lint / typecheck steps see (the template is copied, not imported).
      - name: Scaffold smoke test (create-astroid + astroid doctor)
        run: |
          node packages/create-astroid/index.mjs packages/create-astroid/_smoke \
            --key smoke --name "Smoke Test" --archetype marketing --color "#5b4bff" --host smoke.example
          node packages/astroid/bin/astroid.mjs doctor --cwd packages/create-astroid/_smoke

      - name: Build the site
        run: vp run "site#build"
