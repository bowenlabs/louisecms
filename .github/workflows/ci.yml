name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin the runner to Node 26 (repo engines + .nvmrc). Vite+ runs with
      # VP_NODE_MANAGER=no below, so it uses this runner Node rather than managing
      # its own.
      - uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Install Vite+
        run: |
          curl -fsSL https://vite.plus | VP_NODE_MANAGER=no bash
          # The installer drops the `vp` binary in ~/.vite-plus/bin.
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Install workspace
        run: vp install

      - name: Lint & format (Oxlint + Oxfmt)
        run: vp check
        working-directory: packages/louise

      # oxlint doesn't parse .astro; Biome lints the component scripts (partial
      # Astro support). Scoped to **/*.astro in biome.json — no overlap with oxlint.
      - name: Lint .astro (Biome)
        run: node_modules/.bin/biome lint .

      # `vp check` uses vp's own bundled oxlint and ignores the repo .oxlintrc.json
      # (and its jsPlugins). Run a standalone oxlint to load eslint-plugin-solid via
      # jsPlugins and lint the SolidJS inline-edit client (solid/* rules). It MUST
      # be isolated (`pnpm dlx`, which fetches into a temp store), not a
      # node_modules dep — a node_modules oxlint shadows vp's and breaks
      # `vp check` (vp reads its oxlint config from vite.config.ts, which imports
      # vite-plus, unresolvable to a standalone oxlint).
      #
      # Invoked through `corepack pnpm`, not the `lint:solid` script: the runner
      # has no bare `pnpm` on PATH (this repo drives pnpm through corepack), and
      # the script body's own `pnpm dlx` would hit the same wall.
      - name: Lint SolidJS client (oxlint + eslint-plugin-solid)
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
        run: corepack pnpm dlx --package=oxlint@1.73.0 --package=eslint-plugin-solid@0.14.5 oxlint packages/louise/src/client

      # Dead-code check: unused files and exports across the workspace. Runs on
      # source (entry points mapped in knip.jsonc), so no build is needed.
      - name: Dead-code check (Knip)
        run: node_modules/.bin/knip

      - name: Type-check
        run: vp run "louise#typecheck"

      - name: Test
        run: vp test
        working-directory: packages/louise

      # Astroid's own suite (config validation, the generators, the secret
      # convention). It aliases `louise-toolkit/*` to source in its vitest
      # config, so it needs no build and can run alongside the library's.
      - name: Test (Astroid)
        run: vp test
        working-directory: packages/astroid

      # Build directly (not `vp run louise#pack`): the task-runner form can serve
      # a cache hit without restoring dist/, leaving the site build unable to
      # resolve the `louise-toolkit/*` subpaths.
      - name: Build the library (dist/)
        run: NODE_PATH=node_modules vp pack
        working-directory: packages/louise

      # Type-check Astroid against the BUILT library, which is why it runs after
      # the pack above and not next to the louise typecheck.
      #
      # Astroid's vitest aliases `louise-toolkit/*` to source, so the test suite
      # resolves imports that the published package may not actually expose —
      # it cannot see an export-map problem. This step resolves through
      # node_modules like a real consumer, so a subpath that isn't exported (or
      # isn't emitted by the build) fails here instead of in someone's install.
      #
      # The gap this closes: `louise-toolkit/content/sections` was added as a new
      # export, and nothing in CI would have caught it being missing from the
      # export map or the build output.
      - name: Type-check Astroid (against the built library)
        run: node_modules/.bin/tsgo --noEmit
        working-directory: packages/astroid

      # Build the Astroid CLI (tsgo → dist/) so its generators + bin are runnable.
      # Invoke tsgo directly (the package's `build` script) rather than via a `vp
      # run` task — this must actually produce dist/, like the louise pack above.
      - name: Build the Astroid CLI (dist/)
        run: node_modules/.bin/tsgo -p tsconfig.build.json
        working-directory: packages/astroid

      # Exercise create-astroid end-to-end the way a USER gets it: pack the three
      # packages, install the tarballs into an empty directory outside the repo,
      # and scaffold from the installed copy — then validate with `astroid doctor`.
      #
      # The clean room is the point. Running the scaffold in-tree (as this step used
      # to) resolves every import through the workspace's own node_modules, so a
      # package that forgets to DECLARE a dependency still works — the workspace has
      # it hoisted anyway. That blind spot shipped a broken `create-astroid` to
      # the registry once: astroidjs reaches drizzle-orm through
      # `louise-toolkit/content`, but drizzle-orm is an *optional* peer of
      # louise-toolkit, so it was never installed for real users and the CLI
      # died before writing a file. In-tree it passed.
      #
      # Four details this depends on, none incidental:
      #   - `pnpm pack` (not `npm pack`) — only pnpm rewrites `workspace:*` into the
      #     real version, which is what makes the tarball match a published one.
      #   - Packing runs each package's `prepublishOnly`, so the artifact is built
      #     the same way `pnpm publish` would build it.
      #   - $RUNNER_TEMP is outside the checkout, so there's no workspace root or
      #     hoisted node_modules above it to resolve stray imports from.
      #   - The `overrides` block is what actually pins create-astroid's own
      #     `astroidjs`/`louise-toolkit` deps to THESE tarballs. Installing them
      #     side by side is not enough: pnpm's node_modules is isolated, so
      #     create-astroid resolves its own copy — from the REGISTRY — and the run
      #     silently tests the published packages. (npm only got this right by
      #     accident, via hoisting.)
      #
      # It runs `astro check` + `astro build` on the scaffold, not just `doctor`.
      # Doctor validates config and file freshness but never resolves an import,
      # so it cannot see a dependency the template forgot to declare — which is
      # how a scaffold that couldn't build shipped once already.
      - name: Scaffold smoke test (clean-room install from packed tarballs)
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
        run: |
          set -euo pipefail
          PACK="$RUNNER_TEMP/louise-pack"
          ROOM="$RUNNER_TEMP/louise-clean-room"
          rm -rf "$PACK" "$ROOM"; mkdir -p "$PACK" "$ROOM"

          for pkg in louise astroid create-astroid; do
            ( cd "packages/$pkg" && corepack pnpm pack --pack-destination "$PACK" )
          done
          ls -1 "$PACK"

          cd "$ROOM"
          # A bare manifest, written directly: `pnpm init` emits a caret
          # packageManager range that corepack then refuses to run.
          echo '{ "name": "clean-room", "private": true }' > package.json
          # Pin every astroidjs / louise-toolkit resolution — the scaffold's own
          # install inherits this, so it builds against THESE tarballs too.
          {
            echo "overrides:"
            echo "  astroidjs: \"file:$(ls "$PACK"/astroidjs-*.tgz)\""
            echo "  louise-toolkit: \"file:$(ls "$PACK"/louise-toolkit-*.tgz)\""
          } > pnpm-workspace.yaml
          corepack pnpm add "$PACK"/*.tgz

          # `--commerce` exercises the widest scaffold: the queue consumer, the
          # webhook receiver, and the cron on top of the baseline.
          node node_modules/create-astroid/index.mjs smoke \
            --key smoke --name "Smoke Test" --archetype storefront \
            --color "#5b4bff" --host smoke.example --commerce square

          for f in astroid.config.ts wrangler.jsonc src/schema.ts src/worker.ts \
                   src/middleware.ts src/queue.ts src/pages/api/webhooks/square.ts; do
            test -f "smoke/$f" || { echo "scaffold did not write $f"; exit 1; }
          done

          node node_modules/astroidjs/bin/astroid.mjs doctor --cwd smoke

          # Install and BUILD the scaffold the way a user would. This is the only
          # step that resolves the template's imports, so it's the only one that
          # can catch a dependency it forgot to declare.
          cd smoke
          cp ../pnpm-workspace.yaml .
          printf 'allowBuilds:\n  esbuild: true\n  workerd: true\n  sharp: false\n' >> pnpm-workspace.yaml
          corepack pnpm install
          corepack pnpm exec astro check
          corepack pnpm exec astro build

          # A second scaffold, for the PORTFOLIO archetype. Not redundant: the
          # storefront run above never emits src/pages/work.astro, so it never
          # compiles JustifiedGallery.astro or MediaSlot.astro — and .astro files
          # are invisible to tsgo and vitest, so without this they ship with
          # nothing having type-checked them at all. `astro check` is the only
          # thing in the repo that reads them.
          #
          # It reuses the clean room's pnpm store, so the marginal cost is the
          # check itself rather than a second cold install.
          cd "$ROOM"
          # --map --pwa on purpose. Both modules generate code that NOTHING else
          # compiles: the tile route and MapEmbed.astro are written into the
          # project, and sw.js / the manifest are static files under public/.
          # Without them here they would ship having been checked nowhere.
          #
          # Passing both together also guards the merge hazard they created —
          # each contributes to `modules`, and a naive resolution lets one
          # overwrite the other silently.
          node node_modules/create-astroid/index.mjs folio \
            --key folio --name "Folio" --archetype portfolio --color "#5b4bff" \
            --map --pwa

          test -f folio/src/pages/work.astro || {
            echo "portfolio scaffold did not write src/pages/work.astro"; exit 1; }
          for f in src/pages/map/basemap.pmtiles.ts src/components/MapEmbed.astro \
                   public/sw.js public/manifest.webmanifest; do
            test -f "folio/$f" || { echo "module scaffold did not write $f"; exit 1; }
          done
          grep -q 'modules: \["map","pwa"\]' folio/astroid.config.ts || {
            echo "the modules array lost a module"; cat folio/astroid.config.ts; exit 1; }
          # sw.js is plain JS in public/ and the manifest is data — neither is
          # type-checked by anything, so parse them explicitly.
          node --check folio/public/sw.js
          node -e 'JSON.parse(require("fs").readFileSync("folio/public/manifest.webmanifest","utf8"))'
          node -e 'JSON.parse(require("fs").readFileSync("folio/package.json","utf8"))'

          cd folio
          cp ../pnpm-workspace.yaml .
          printf 'allowBuilds:\n  esbuild: true\n  workerd: true\n  sharp: false\n' >> pnpm-workspace.yaml
          corepack pnpm install
          corepack pnpm exec astro check
          corepack pnpm exec astro build

          # Type-check ASTROID'S OWN .astro components.
          #
          # `astro check` only diagnoses files inside the project, so components
          # imported from node_modules/astroidjs are invisible to it — verified
          # with a deliberate type error, which passed straight through. That
          # left the whole section library compiling nowhere: tsgo doesn't read
          # .astro, vitest doesn't either, and a scaffold only surfaces errors in
          # its OWN files (which is how the mountSections bug was caught).
          #
          # Copying them under src/ makes them project files for one check pass.
          # Run after the build so the copies can't reach the output.
          cp -r node_modules/astroidjs/src/components src/_astroid_probe
          corepack pnpm exec astro check
          rm -rf src/_astroid_probe

      - name: Build the site
        run: vp run "site#build"
